[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Wrap in `sh -c` so $PORT (injected by Railway) is expanded by a shell.
# Without the shell, uvicorn receives the literal string "$PORT" and errors.
startCommand = "sh -c 'uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
